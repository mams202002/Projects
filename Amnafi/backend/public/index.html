<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Répertoire Commerces Sénégalais</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f8f9fa; color: #333; }
        .container { max-width: 1000px; margin: auto; }
        h1 { color: #2c3e50; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        button { 
            padding: 12px 24px; background: #007bff; color: white; border: none; 
            cursor: pointer; margin-bottom: 20px; border-radius: 4px; font-weight: bold;
        }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #007bff; color: white; text-transform: uppercase; font-size: 0.9em; }
        tr:hover { background: #f1f1f1; }
        .error { color: #d9534f; background: #f2dede; padding: 10px; border-radius: 4px; margin-bottom: 20px; display: none; }
        .col-index { width: 50px; text-align: center; font-weight: bold; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Répertoire des Commerces - Paris</h1>
        <div id="status-message" class="error"></div>
        <button id="btn-load">Charger les données</button>

        <table id="resultats">
            <thead>
                <tr>
                    <th class="col-index">N°</th>
                    <th>Nom de l'enseigne</th>
                    <th>Adresse</th>
                    <th>CP</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>

    <script>
        document.getElementById('btn-load').addEventListener('click', loadData);

        async function loadData() {
            const btn = document.getElementById('btn-load');
            const tbody = document.getElementById('table-body');
            const status = document.getElementById('status-message');
            
            // UI Reset
            btn.disabled = true;
            btn.textContent = "Chargement...";
            status.style.display = "none";
            tbody.innerHTML = "";

            try {
                const response = await fetch('/api/commerces');
                if (!response.ok) throw new Error(`Erreur ${response.status}: Service indisponible`);
                
                let data = await response.json();

                if (data.length === 0) {
                    status.textContent = "Aucun résultat trouvé.";
                    status.style.display = "block";
                    return;
                }

                // Tri par code postal
                data.sort((a, b) => (a.adresseEtablissement?.codePostalEtablissement || "")
                                    .localeCompare(b.adresseEtablissement?.codePostalEtablissement || ""));

                // Construction propre du fragment (Performance ++)
                const fragment = document.createDocumentFragment();

                data.forEach((etab, index) => {
                    const row = document.createElement('tr');
                    
                    const adr = etab.adresseEtablissement || {};
                    const nomEnseigne = etab.periodesEtablissement?.[0]?.enseigne1Etablissement 
                                     || etab.uniteLegale?.denominationUniteLegale 
                                     || "Nom inconnu";

                    const rue = `${adr.numeroVoieEtablissement || ''} ${adr.typeVoieEtablissement || ''} ${adr.libelleVoieEtablissement || ''}`.trim();

                    // Création sécurisée des cellules (Zéro XSS)
                    row.innerHTML = `
                        <td class="col-index">${index + 1}</td>
                        <td class="cell-name"></td>
                        <td class="cell-address"></td>
                        <td>${adr.codePostalEtablissement || 'N/A'}</td>
                    `;
                    
                    row.querySelector('.cell-name').textContent = nomEnseigne;
                    row.querySelector('.cell-address').textContent = rue || 'Adresse non renseignée';
                    
                    fragment.appendChild(row);
                });

                tbody.appendChild(fragment);

            } catch (error) {
                status.textContent = error.message;
                status.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.textContent = "Charger les données";
            }
        }
    </script>
</body>
</html>
